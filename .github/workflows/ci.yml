name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: rabbithole
          POSTGRES_PASSWORD: rabbithole
          POSTGRES_DB: rabbithole_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U rabbithole -d rabbithole_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Nix build
        run: nix build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        env:
          WARREN_TEST_DATABASE_URL: "postgresql://rabbithole:rabbithole@127.0.0.1:5433/rabbithole_test?sslmode=disable"
        run: go test ./...
