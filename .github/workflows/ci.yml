name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Nix build
        run: nix build

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: rabbithole
          POSTGRES_PASSWORD: rabbithole
          POSTGRES_DB: rabbithole_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U rabbithole -d rabbithole_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        env:
          WARREN_TEST_DATABASE_URL: "postgresql://rabbithole:rabbithole@127.0.0.1:5433/rabbithole_test?sslmode=disable"
        run: go test ./...

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: e2e/pnpm-lock.yaml

      - name: Install e2e dependencies
        working-directory: e2e
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: pnpm exec playwright install chromium --with-deps

      - name: Run e2e tests
        working-directory: e2e
        env:
          DATABASE_URL: "postgresql://rabbithole:rabbithole@127.0.0.1:5433/rabbithole_test?sslmode=disable"
        run: pnpm test
